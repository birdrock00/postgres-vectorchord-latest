name: Build and Push Latest VectorChord

on:
  schedule:
    # Run every Friday at 10:00 PM UTC (adjust as needed)
    - cron: '0 22 * * 5'
  workflow_dispatch: # Allows manual triggering for testing

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: birdrock00/postgres-vectorchord-latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Find latest vchord-postgres tag
        id: get_vchord_tag
        run: |
          # Query Docker Hub API for the most recently updated tag
          TAG=$(curl -s "https://hub.docker.com/v2/repositories/tensorchord/vchord-postgres/tags/?page_size=25" | \
                jq -r '.results | sort_by(.last_updated) | reverse | .[0].name')
          
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "Error: Could not find a tag for tensorchord/vchord-postgres"
            exit 1
          fi
          
          echo "VC_IMAGE_TAG=$TAG" >> $GITHUB_ENV
          echo "Found latest vchord-postgres tag: $TAG"

      - name: Find and Download latest VectorChord .deb
        id: get_deb
        run: |
          # Get the latest release JSON from GitHub API
          RELEASE_DATA=$(curl -sL "https://api.github.com/repos/tensorchord/VectorChord/releases/latest")
          
          # Parse assets to find the .deb file for amd64 (standard GitHub runner architecture)
          # Logic: 
          # 1. Select assets ending in .deb
          # 2. Filter for architecture (amd64)
          # 3. Extract Postgres version number from filename (e.g. postgresql-18... -> 18)
          # 4. Sort by Postgres version descending
          # 5. Pick the top one (Highest PG version)
          
          DEB_URL=$(echo "$RELEASE_DATA" | jq -r '
            .assets 
            | map(select(.name | endswith(".deb") and contains("amd64"))) 
            | map({name: .name, url: .browser_download_url, pg_ver: (.name | capture("postgresql-(?<ver>[0-9]+)-vchord") | .ver | tonumber)}) 
            | sort_by(.pg_ver) 
            | reverse 
            | .[0] 
            | .url
          ')
          
          DEB_NAME=$(echo "$RELEASE_DATA" | jq -r '
            .assets 
            | map(select(.name | endswith(".deb") and contains("amd64"))) 
            | map({name: .name, pg_ver: (.name | capture("postgresql-(?<ver>[0-9]+)-vchord") | .ver | tonumber)}) 
            | sort_by(.pg_ver) 
            | reverse 
            | .[0] 
            | .name
          ')
          
          if [ -z "$DEB_URL" ] || [ "$DEB_URL" = "null" ]; then
            echo "Error: Could not find a suitable .deb file"
            exit 1
          fi
          
          echo "Downloading: $DEB_NAME"
          curl -sL "$DEB_URL" -o "$DEB_NAME"
          
          # Save the filename to environment for the Docker build
          echo "DEB_FILENAME=$DEB_NAME" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            VC_IMAGE_TAG=${{ env.VC_IMAGE_TAG }}
            DEB_FILENAME=${{ env.DEB_FILENAME }}
